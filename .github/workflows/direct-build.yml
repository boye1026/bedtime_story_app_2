name: Direct Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Write correct main.dart
        run: |
          mkdir -p mobile/lib
          cat > mobile/lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_tts/flutter_tts.dart';
          import 'package:google_fonts/google_fonts.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          void main() {
            runApp(const BedtimeStoryApp());
          }

          class BedtimeStoryApp extends StatelessWidget {
            const BedtimeStoryApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'AI睡前故事',
                theme: ThemeData(
                  primarySwatch: Colors.deepPurple,
                  scaffoldBackgroundColor: Colors.grey.shade50,
                  textTheme: GoogleFonts.poppinsTextTheme(),
                  useMaterial3: true,
                ),
                home: const HomePage(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class HomePage extends StatefulWidget {
            const HomePage({super.key});

            @override
            State<HomePage> createState() => _HomePageState();
          }

          class _HomePageState extends State<HomePage> {
            final FlutterTts _flutterTts = FlutterTts();
            final TextEditingController _nameController = TextEditingController();
            String _generatedStory = '';
            bool _isPlaying = false;

            @override
            void initState() {
              super.initState();
              _initTTS();
            }

            Future<void> _initTTS() async {
              await _flutterTts.setLanguage("zh-CN");
              await _flutterTts.setSpeechRate(0.5);
              await _flutterTts.setPitch(1.0);
            }

            Future<void> _generateStory() async {
              setState(() {
                _generatedStory = "从前有一个叫${_nameController.text}的小朋友，他/她非常勇敢善良...";
              });
            }

            Future<void> _speakStory() async {
              if (_generatedStory.isNotEmpty) {
                setState(() => _isPlaying = true);
                await _flutterTts.speak(_generatedStory);
              }
            }

            Future<void> _stopStory() async {
              await _flutterTts.stop();
              setState(() => _isPlaying = false);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('AI睡前故事'),
                  backgroundColor: Colors.deepPurple,
                  foregroundColor: Colors.white,
                ),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      TextField(
                        controller: _nameController,
                        decoration: const InputDecoration(
                          labelText: '宝宝的名字',
                          border: OutlineInputBorder(),
                        ),
                      ),
                      const SizedBox(height: 20),
                      ElevatedButton(
                        onPressed: _generateStory,
                        child: const Text('生成故事'),
                      ),
                      const SizedBox(height: 20),
                      if (_generatedStory.isNotEmpty)
                        Card(
                          child: Padding(
                            padding: const EdgeInsets.all(16.0),
                            child: Column(
                              children: [
                                Text(_generatedStory),
                                const SizedBox(height: 10),
                                Row(
                                  children: [
                                    ElevatedButton(
                                      onPressed: _speakStory,
                                      child: const Text('播放'),
                                    ),
                                    const SizedBox(width: 10),
                                    ElevatedButton(
                                      onPressed: _stopStory,
                                      child: const Text('停止'),
                                    ),
                                  ],
                                ),
                              ],
                            ),
                          ),
                        ),
                    ],
                  ),
                ),
              );
            }

            @override
            void dispose() {
              _nameController.dispose();
              _flutterTts.stop();
              super.dispose();
            }
          }
          EOF
          
          echo "✅ main.dart written"
          cat mobile/lib/main.dart | head -20
      
      - name: Create pubspec.yaml
        working-directory: mobile
        run: |
          cat > pubspec.yaml << 'EOF'
          name: bedtime_story_app
          description: AI睡前故事应用
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            flutter_tts: ^3.8.5
            google_fonts: ^6.1.0
            shared_preferences: ^2.2.2
            path_provider: ^2.1.1

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF
      
      - name: Build APK
        working-directory: mobile
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
